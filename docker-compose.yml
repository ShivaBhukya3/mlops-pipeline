version: "3.9"

# ── Networks & Volumes ────────────────────────────────────────────────────────
networks:
  mlops-net:
    driver: bridge

volumes:
  postgres-data:
  mlflow-artifacts:
  redis-data:
  airflow-logs:
  prometheus-data:
  grafana-data:

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ─── PostgreSQL (metadata store for MLflow & Airflow) ─────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: mlops-postgres
    environment:
      POSTGRES_USER: mlops
      POSTGRES_PASSWORD: mlops_secret
      POSTGRES_DB: mlops
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [mlops-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlops"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis (Celery broker for Airflow) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mlops-redis
    volumes: [redis-data:/data]
    networks: [mlops-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── MLflow Tracking Server ────────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: mlops-mlflow
    command: >
      bash -c "pip install mlflow psycopg2-binary boto3 -q &&
      mlflow server
        --backend-store-uri postgresql://mlops:mlops_secret@postgres:5432/mlops
        --default-artifact-root /mlflow/artifacts
        --host 0.0.0.0
        --port 5000
        --serve-artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    networks: [mlops-net]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: postgresql://mlops:mlops_secret@postgres:5432/mlops
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ─── ML Training (one-shot) ────────────────────────────────────────────────
  training:
    build:
      context: .
      dockerfile: docker/Dockerfile.training
    container_name: mlops-training
    command: ["bash", "-c", "python scripts/train.py ingest && python scripts/train.py preprocess-cmd && python scripts/train.py train --promote"]
    volumes:
      - ./data:/app/data
      - ./mlruns:/app/mlruns
    networks: [mlops-net]
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      CONFIG_PATH: config/config.yaml
    profiles: ["train"]

  # ─── FastAPI Model Serving ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: mlops-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./mlruns:/app/mlruns
    networks: [mlops-net]
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      CONFIG_PATH: config/config.yaml
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ─── Dashboard ────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: mlops-dashboard
    ports:
      - "8050:8050"
    volumes:
      - ./data:/app/data
      - ./mlruns:/app/mlruns
    networks: [mlops-net]
    depends_on:
      - api
    environment:
      ML_API_URL: http://api:8000
      MLFLOW_TRACKING_URI: http://mlflow:5000
      CONFIG_PATH: config/config.yaml
    restart: unless-stopped

  # ─── Airflow ──────────────────────────────────────────────────────────────
  airflow-init:
    image: apache/airflow:2.9.1-python3.11
    container_name: mlops-airflow-init
    command: >
      bash -c "airflow db migrate &&
               airflow users create --username admin --password admin
               --firstname Admin --lastname User --role Admin
               --email admin@mlops.local"
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://mlops:mlops_secret@postgres:5432/mlops
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://mlops:mlops_secret@postgres:5432/mlops
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nIe3aI="
      AIRFLOW__WEBSERVER__SECRET_KEY: "mlops_webserver_secret"
    networks: [mlops-net]
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["airflow"]

  airflow-webserver:
    image: apache/airflow:2.9.1-python3.11
    container_name: mlops-airflow-web
    command: webserver
    ports: ["8080:8080"]
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - ./src:/opt/airflow/project/src
      - ./config:/opt/airflow/project/config
      - ./data:/opt/airflow/project/data
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://mlops:mlops_secret@postgres:5432/mlops
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nIe3aI="
      AIRFLOW__WEBSERVER__SECRET_KEY: "mlops_webserver_secret"
    networks: [mlops-net]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    profiles: ["airflow"]
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.9.1-python3.11
    container_name: mlops-airflow-scheduler
    command: scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - ./src:/opt/airflow/project/src
      - ./config:/opt/airflow/project/config
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://mlops:mlops_secret@postgres:5432/mlops
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nIe3aI="
    networks: [mlops-net]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    profiles: ["airflow"]
    restart: unless-stopped

  airflow-worker:
    image: apache/airflow:2.9.1-python3.11
    container_name: mlops-airflow-worker
    command: celery worker
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - ./src:/opt/airflow/project/src
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://mlops:mlops_secret@postgres:5432/mlops
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nIe3aI="
    networks: [mlops-net]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    profiles: ["airflow"]
    restart: unless-stopped

  # ─── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: mlops-prometheus
    ports: ["9090:9090"]
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [mlops-net]
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    profiles: ["monitoring"]
    restart: unless-stopped

  # ─── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: mlops-grafana
    ports: ["3000:3000"]
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    networks: [mlops-net]
    depends_on: [prometheus]
    profiles: ["monitoring"]
    restart: unless-stopped
