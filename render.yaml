databases:
  - name: mlops-postgres
    databaseName: mlops
    user: mlops
    plan: free

services:

  # ── 1. ML Serving API ────────────────────────────────────────────────────
  - type: web
    name: mlops-api
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.api
    plan: free
    healthCheckPath: /health
    envVars:
      - key: CONFIG_PATH
        value: config/config.yaml
      - key: MLFLOW_TRACKING_URI
        value: mlruns

  # ── 2. Dashboard (Main UI) ───────────────────────────────────────────────
  - type: web
    name: mlops-dashboard
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.dashboard
    plan: free
    healthCheckPath: /health
    envVars:
      - key: CONFIG_PATH
        value: config/config.yaml
      - key: ML_API_URL
        fromService:
          name: mlops-api
          type: web
          property: hostport

  # MLflow UI is excluded from Render (exceeds 512 MB free-tier RAM limit).
  # Run it locally with: mlflow ui --port 5000
