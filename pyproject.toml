[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501", "N806"]
exclude = ["mlruns/", ".venv/", "data/"]

[tool.black]
line-length = 100
target-version = ["py311"]
exclude = '''/(mlruns|\.venv|data)/'''

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--tb=short -q"

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
warn_return_any = false

[tool.coverage.run]
source = ["src"]
omit = ["tests/*", "scripts/*", "mlruns/*"]

[tool.coverage.report]
show_missing = true
fail_under = 70
